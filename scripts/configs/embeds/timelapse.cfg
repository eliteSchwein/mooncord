[embed timelapse_files]
color: '${theme.timelapse_files}'
image: pageGraph
graph_data: ${raw_entries}
graph_id: timelapse_files
buttons:
- last_page_timelapselist
- next_page_timelapselist
select_menus:
- timelapse_download

[page_graph timelapse_files]
file: 'svgs/listtimelapses.svg'
width: 1300
height: 1500
entry_offset: 155
entry_key: 'path'
parameter1_id: 'thumbnail'
parameter1_type: 'image'
parameter1_value: ${thumbnail:graph_entry:timelapse}
parameter2_id: 'filename'
parameter2_type: 'text'
parameter2_value: '${substr:45:graph_entry}'